# Local Postgres for development. Railway used for production only.
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: signnest
    volumes:
      - signnest_pgdata:/var/lib/postgresql/data

volumes:
  signnest_pgdata:
